name: Publish S03 v0.1.4 package

on:
  push:
    branches:
      - scenario/9-revised-dinner-pricing-and-opex
    paths:
      - '.s03_publish/part_09.hex'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode and verify bootstrap package
        shell: bash
        run: |
          set -euo pipefail
          cat .s03_publish/part_*.hex > /tmp/s03_bootstrap.hex
          python - <<'PY'
          from pathlib import Path
          data = bytes.fromhex(Path('/tmp/s03_bootstrap.hex').read_text().strip())
          Path('/tmp/s03_bootstrap.zip').write_bytes(data)
          PY
          test "$(stat -c %s /tmp/s03_bootstrap.zip)" -eq 74071
          echo "c88bbd443dd6c4e11a168094d6d0d4896d0e4ca86d247d63b7b038cb70368a09  /tmp/s03_bootstrap.zip" | sha256sum --check --strict
          mkdir -p /tmp/s03_bootstrap
          unzip -q /tmp/s03_bootstrap.zip -d /tmp/s03_bootstrap

      - name: Reconstruct exact S03 workbook
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet bsdiff4
          python - <<'PY'
          from pathlib import Path
          import bsdiff4, hashlib

          base = Path('models/scenarios/S02/FINMODEL_VARSHAVKA_USALI_SCENARIO_S02_v0.1.0.xlsx')
          patch = Path('/tmp/s03_bootstrap/_payload/model.patch')
          target = Path('/tmp/s03_bootstrap/models/scenarios/S03/FINMODEL_VARSHAVKA_USALI_SCENARIO_S03_v0.1.4.xlsx')
          target.parent.mkdir(parents=True, exist_ok=True)

          result = bsdiff4.patch(base.read_bytes(), patch.read_bytes())
          target.write_bytes(result)

          assert len(result) == 118378
          assert hashlib.sha256(result).hexdigest() == '4af4208da64b4dcf721edb626e590c1c57e2de6588d564409ec6a4b383bd29f3'
          PY

      - name: Apply package
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/s03_bootstrap/_payload
          cp -a /tmp/s03_bootstrap/. .
          rm -rf .s03_publish
          rm -f .github/workflows/publish-s03-v014.yml

      - name: Commit published S03
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "model: add S03 v0.1.4 with dinner COGS link"
          git push origin HEAD:scenario/9-revised-dinner-pricing-and-opex
