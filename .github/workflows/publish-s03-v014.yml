name: Publish S03 v0.1.4 package

on:
  push:
    branches:
      - scenario/9-revised-dinner-pricing-and-opex
    paths:
      - '.s03_publish/docs_01.b64'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode and verify payloads
        shell: bash
        run: |
          set -euo pipefail
          cat .s03_publish/model_*.b64 > /tmp/s03_model.patch.b64
          base64 --decode /tmp/s03_model.patch.b64 > /tmp/s03_model.patch
          test "$(stat -c %s /tmp/s03_model.patch)" -eq 57371
          echo "bd5075e998a98d307ca1c8d3feb268f7998a74f7bdd6bb02e33c21f2651fbd61  /tmp/s03_model.patch" | sha256sum --check --strict

          cat .s03_publish/docs_*.b64 > /tmp/s03_docs.zip.b64
          base64 --decode /tmp/s03_docs.zip.b64 > /tmp/s03_docs.zip
          test "$(stat -c %s /tmp/s03_docs.zip)" -eq 16596
          echo "5507b2abd6849c91916807d0f355bbe350734964d60f1e0f3463add969d4399b  /tmp/s03_docs.zip" | sha256sum --check --strict

      - name: Reconstruct exact S03 workbook
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet bsdiff4
          python - <<'PY'
          from pathlib import Path
          import bsdiff4, hashlib

          base = Path('models/scenarios/S02/FINMODEL_VARSHAVKA_USALI_SCENARIO_S02_v0.1.0.xlsx')
          patch = Path('/tmp/s03_model.patch')
          target = Path('models/scenarios/S03/FINMODEL_VARSHAVKA_USALI_SCENARIO_S03_v0.1.4.xlsx')
          target.parent.mkdir(parents=True, exist_ok=True)

          result = bsdiff4.patch(base.read_bytes(), patch.read_bytes())
          target.write_bytes(result)

          assert len(result) == 118378
          assert hashlib.sha256(result).hexdigest() == '4af4208da64b4dcf721edb626e590c1c57e2de6588d564409ec6a4b383bd29f3'
          PY

      - name: Apply documentation package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/s03_docs
          unzip -q /tmp/s03_docs.zip -d /tmp/s03_docs
          cp -a /tmp/s03_docs/. .
          rm -rf .s03_publish
          rm -f .github/workflows/publish-s03-v014.yml

      - name: Commit published S03
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "model: add S03 v0.1.4 with dinner COGS link"
          git push origin HEAD:scenario/9-revised-dinner-pricing-and-opex
