name: Diagnose S03 model builder

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: scenario/9-revised-dinner-pricing-and-opex
          fetch-depth: 1
          show-progress: false

      - name: Run model builder
        shell: bash
        run: |
          python -m pip install --quiet openpyxl
          PYTHONPATH=scripts python -c "from s03_model_builder import build_model; print(build_model())"
