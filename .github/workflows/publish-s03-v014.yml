name: Run S03 v0.1.4 publication

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: scenario/9-revised-dinner-pricing-and-opex
          fetch-depth: 1
          show-progress: false

      - name: Build package
        run: |
          python -m pip install --quiet openpyxl
          PYTHONPATH=scripts python scripts/run_s03_publication.py

      - name: Commit package or diagnostic trace
        run: |
          rm -rf .s03_publish
          rm -f .github/workflows/publish-s03-v014.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: run S03 v0.1.4 publication"
          git push origin HEAD:scenario/9-revised-dinner-pricing-and-opex
