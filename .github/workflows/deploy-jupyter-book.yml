name: Build and deploy Jupyter Book

on:
  pull_request:
    branches:
      - main
    paths:
      - "book/**"
      - ".github/workflows/deploy-jupyter-book.yml"

  push:
    branches:
      - main
    paths:
      - "book/**"
      - ".github/workflows/deploy-jupyter-book.yml"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

env:
  BASE_URL: /varshavka-cafe-usali-model
  VIDEO_URL: https://narqdnyjnqqekdjpysye.supabase.co/storage/v1/object/public/varshavka-video/varshavka-2026-2027.mp4

jobs:
  build:
    name: Build Jupyter Book
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: book/requirements.txt

      - name: Install Jupyter Book
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r book/requirements.txt

      - name: Show installed versions
        run: |
          set -euo pipefail
          echo "Python:"
          python --version
          echo "Pip:"
          python -m pip --version
          echo "Node.js:"
          node --version
          echo "Jupyter Book:"
          jupyter book --version

      - name: Validate public Supabase video
        run: |
          set -euo pipefail

          curl \
            --silent \
            --show-error \
            --location \
            --fail \
            --range 0-1023 \
            --dump-header /tmp/video-headers.txt \
            --output /tmp/video-sample.bin \
            "$VIDEO_URL"

          echo "Response headers:"
          cat /tmp/video-headers.txt

          grep -iE '^content-type: *video/mp4' /tmp/video-headers.txt \
            || {
              echo "ERROR: Supabase did not return Content-Type video/mp4"
              exit 1
            }

          test -s /tmp/video-sample.bin \
            || {
              echo "ERROR: Video sample is empty"
              exit 1
            }

          echo "Supabase video validation completed successfully."

      - name: Build book with strict checks
        working-directory: book
        run: |
          set -euo pipefail
          jupyter book build --html --strict

      - name: Show generated files
        if: always()
        run: |
          echo "Generated build tree:"
          find book/_build -maxdepth 4 -type f 2>/dev/null | sort || true

      - name: Validate generated website
        run: |
          set -euo pipefail

          test -f book/_build/html/index.html \
            || {
              echo "ERROR: Main index.html was not generated"
              exit 1
            }

          test -f book/_build/html/video/index.html \
            || {
              echo "ERROR: video/index.html was not generated"
              exit 1
            }

          test -f book/_build/html/project/index.html \
            || {
              echo "ERROR: project/index.html was not generated"
              exit 1
            }

          grep -Fq "$VIDEO_URL" book/_build/html/video/index.html \
            || {
              echo "ERROR: Supabase video URL is missing from generated video page"
              exit 1
            }

          if grep -Fq "app.heygen.com" book/_build/html/video/index.html; then
            echo "ERROR: Generated video page still contains a HeyGen link"
            exit 1
          fi

          echo "Generated website validation completed successfully."

      - name: Configure GitHub Pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v4
        with:
          path: book/_build/html

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Wait for GitHub Pages propagation
        run: sleep 15

      - name: Verify published website
        env:
          SITE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail

          echo "Published site URL: $SITE_URL"

          curl \
            --silent \
            --show-error \
            --location \
            --fail \
            --retry 5 \
            --retry-delay 5 \
            "${SITE_URL}" \
            > /tmp/index.html

          curl \
            --silent \
            --show-error \
            --location \
            --fail \
            --retry 5 \
            --retry-delay 5 \
            "${SITE_URL}video/" \
            > /tmp/video.html

          curl \
            --silent \
            --show-error \
            --location \
            --fail \
            --retry 5 \
            --retry-delay 5 \
            "${SITE_URL}project/" \
            > /tmp/project.html

          grep -Fq "$VIDEO_URL" /tmp/video.html \
            || {
              echo "ERROR: Published video page does not contain the Supabase URL"
              exit 1
            }

          if grep -Fq "app.heygen.com" /tmp/video.html; then
            echo "ERROR: Published video page still contains a HeyGen link"
            exit 1
          fi

          echo "Published website validation completed successfully."
